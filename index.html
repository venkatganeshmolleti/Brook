<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BROOK</title>
 
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SPLASH SCREEN -->
<section id="splash">

    <div class="aura"></div>

    <img
        id="brookCharacter"
        src="brook.png"
        alt="Brook"
    >

    <h1 class="brook-title">BROOK</h1>

    <div class="tap-text">
        ( TAP BROOK )
    </div>

</section>

<!-- INTRO SCREEN -->
<section id="intro">

    <div class="intro-content">

        <h1 class="yoho">
            YOHOHOHOHO!
        </h1>

        <p class="intro-line">
            I'm Brook,<br>
            musician of the Straw Hat Pirates.
        </p>

    </div>

</section>

<!-- LOADING SCREEN -->
<section id="loading">

    <div class="portal"></div>

    <h2>
        Preparing our next adventure...
    </h2>

</section>

<!-- CHAT SCREEN -->
<section id="chat">

    <header class="chat-header">
        BROOK
    </header>

    <div class="soul-banner">
        👻 Soul scouting for answers...
    </div>

    <div class="messages">

        <div class="brook-msg">
            YOHOHOHOHO! Welcome back, Captain!
        </div>

    </div>

    <div class="composer">

        <input
            type="text"
            placeholder="Ask Brook anything..."
        >

        <button>
            ➜
        </button>

    </div>

</section>

<audio id="introAudio">
    <source src="brook-intro.mp3" type="audio/mpeg">
</audio>

<script src="app.js"></script>

</body>
</html>
