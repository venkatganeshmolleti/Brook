<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#05050A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="face" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#05050A"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Aura -->
  <circle cx="100" cy="100" r="95" fill="url(#aura)"/>
  <!-- Body circle -->
  <circle cx="100" cy="100" r="75" fill="url(#face)" stroke="#A78BFA" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Top hat -->
  <rect x="65" y="28" width="70" height="8" rx="3" fill="#1a1a2e" stroke="#6EE7F7" stroke-width="1"/>
  <rect x="72" y="10" width="56" height="22" rx="4" fill="#0F0F1A" stroke="#6EE7F7" stroke-width="1"/>
  <!-- Hat band -->
  <rect x="72" y="27" width="56" height="4" fill="#A78BFA" opacity="0.6"/>
  <!-- Skull eyes -->
  <ellipse cx="82" cy="95" rx="10" ry="12" fill="#000" stroke="#6EE7F7" stroke-width="1" filter="url(#glow)"/>
  <ellipse cx="118" cy="95" rx="10" ry="12" fill="#000" stroke="#6EE7F7" stroke-width="1" filter="url(#glow)"/>
  <!-- Eye glow -->
  <ellipse cx="82" cy="95" rx="5" ry="6" fill="#6EE7F7" opacity="0.4"/>
  <ellipse cx="118" cy="95" rx="5" ry="6" fill="#6EE7F7" opacity="0.4"/>
  <!-- Nose -->
  <path d="M97 112 L100 106 L103 112 Z" fill="#A78BFA" opacity="0.6"/>
  <!-- Smile -->
  <path d="M78 125 Q100 140 122 125" stroke="#7CFFB2" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Teeth -->
  <rect x="85" y="125" width="8" height="7" rx="1" fill="#e0e0e0" opacity="0.8"/>
  <rect x="95" y="125" width="10" height="8" rx="1" fill="#e0e0e0" opacity="0.9"/>
  <rect x="107" y="125" width="8" height="7" rx="1" fill="#e0e0e0" opacity="0.8"/>
  <!-- Bow tie -->
  <path d="M85 155 L100 163 L115 155 L100 148 Z" fill="#A78BFA" opacity="0.8"/>
  <!-- Soul particles -->
  <circle cx="55" cy="70" r="2" fill="#7CFFB2" opacity="0.6"/>
  <circle cx="145" cy="80" r="1.5" fill="#A78BFA" opacity="0.5"/>
  <circle cx="60" cy="130" r="1" fill="#6EE7F7" opacity="0.4"/>
  <circle cx="148" cy="120" r="2" fill="#7CFFB2" opacity="0.5"/>
</svg>
